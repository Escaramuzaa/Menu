<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escaramuza – Menú</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f9f6f1;
      color: #2c1a0e;
      min-height: 100vh;
    }

    #lang-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e8e0d5;
    }
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      background: #f5f0ea;
      color: #5a3e28;
      transition: all 0.2s;
    }
    .lang-btn:hover { background: #e8dfd3; }
    .lang-btn.active { background: #2c1a0e; color: #fff; }

    header {
      text-align: center;
      padding: 40px 20px 28px;
    }
    header img {
      max-width: 320px;
      width: 80%;
      margin: 0 auto 16px;
      display: block;
    }
    .header-line {
      width: 48px; height: 2px;
      background: #c8a97e;
      margin: 12px auto;
    }
    header p {
      font-size: 0.78rem;
      letter-spacing: 4px;
      color: #9a7d5e;
      font-style: italic;
    }

    #tab-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 0 16px 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1.5px solid #ddd3c7;
      background: #fff;
      color: #7a6050;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      font-family: Georgia, serif;
    }
    .tab-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .tab-btn:hover { background: #f5ede3; }
    .tab-btn.active {
      background: #2c1a0e; color: #fff;
      border-color: #2c1a0e;
      box-shadow: 0 4px 14px rgba(44,26,14,0.18);
    }

    #menu-card {
      max-width: 900px;
      margin: 0 auto 48px;
      padding: 0 16px;
    }
    .card-inner {
      background: #fff;
      border-radius: 32px;
      border: 1px solid #ece5db;
      box-shadow: 0 8px 40px rgba(44,26,14,0.07);
      padding: clamp(24px, 6vw, 56px);
      min-height: 480px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f3ede5;
      padding-bottom: 24px;
      margin-bottom: 32px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 300;
      color: #2c1a0e;
    }
    .card-title svg { width: 24px; height: 24px; flex-shrink: 0; }
    .card-price-global {
      font-size: 1.5rem;
      color: #ccc0b0;
      font-style: italic;
      font-weight: 300;
    }

    /* ── ITEMS ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px 56px;
    }
    .menu-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f5f0ea;
    }
    .menu-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .menu-item-name {
      font-size: 1rem;
      font-weight: 600;
      color: #2c1a0e;
      line-height: 1.4;
    }
    .menu-item-price {
      color: #b0a090;
      font-style: italic;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .menu-item-desc {
      font-size: 0.8rem;
      color: #9a8070;
      line-height: 1.5;
      font-style: italic;
    }
    .menu-item-options {
      font-size: 0.78rem;
      color: #c8a97e;
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── TÉS ── */
    .sub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 32px;
    }
    .subcat { display: flex; flex-direction: column; gap: 12px; }
    .subcat-header { display: flex; align-items: center; gap: 12px; }
    .subcat-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
    .dot-black { background: #3f3f46; }
    .dot-green { background: #10b981; }
    .dot-gold  { background: #fbbf24; }
    .dot-amber { background: #ea580c; }
    .subcat-name {
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; color: #2c1a0e;
    }
    .subcat-tag {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: #9a8070;
    }
    .subcat-profile {
      font-size: 0.82rem; color: #7a6a58; font-style: italic;
      line-height: 1.5; background: #f9f5f0;
      border-left: 3px solid #ddd3c7;
      padding: 10px 14px; border-radius: 0 8px 8px 0;
    }
    .subcat ul { list-style: none; display: flex; flex-direction: column; gap: 14px; padding-top: 4px; }
    .subcat li { display: flex; flex-direction: column; gap: 3px; }
    .subcat-li-top { display: flex; justify-content: space-between; align-items: baseline; }
    .subcat-li-name { font-size: 0.95rem; font-weight: 600; color: #2c1a0e; }
    .subcat-li-price { font-size: 0.85rem; color: #c0b0a0; font-style: italic; }
    .subcat-li-desc { font-size: 0.78rem; color: #9a8070; font-style: italic; line-height: 1.4; }

    /* ── ACORDEÓN ── */
    .accordion {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .accordion-section {
      border: 1px solid #ece5db;
      border-radius: 16px;
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: #f9f5f0;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .accordion-header:hover { background: #f0e8dc; }
    .accordion-title {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #2c1a0e;
    }
    .accordion-arrow {
      width: 20px; height: 20px;
      color: #c8a97e;
      transition: transform 0.3s;
      flex-shrink: 0;
    }
    .accordion-arrow.open { transform: rotate(180deg); }
    .accordion-body {
      display: none;
      padding: 20px;
      border-top: 1px solid #ece5db;
    }
    .accordion-body.open { display: block; }
    .accordion-body .items-grid { gap: 16px 40px; }

    /* ── AGREGADOS ── */
    .agregados-box {
      margin-top: 24px;
      padding: 16px 20px;
      background: #f9f5f0;
      border: 1px solid #ece5db;
      border-radius: 16px;
    }
    .agregados-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a8070;
      margin-bottom: 10px;
    }
    .agregados-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .agregado-chip {
      background: #fff;
      border: 1px solid #ddd3c7;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 0.78rem;
      color: #5a3e28;
    }
    .agregado-chip span {
      color: #c8a97e;
      font-weight: 700;
      margin-left: 4px;
    }

    /* ── NOTA ── */
    .card-note {
      margin-top: 32px;
      padding: 16px 20px;
      background: #f9f5f0;
      border: 1px solid #ece5db;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: #7a6a58;
      font-weight: 500;
    }
    .card-note svg { width: 18px; height: 18px; color: #b0a090; flex-shrink: 0; }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.68rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #c0b0a0;
    }

    @media (max-width: 520px) {
      .items-grid { grid-template-columns: 1fr; }
      .sub-grid   { grid-template-columns: 1fr; }
    }
  </style>
</head>

let currentLang = 'es';
let currentTab  = 0;

function renderLangBar() {
  document.getElementById('lang-bar').innerHTML = languages.map(l => `
    <button class="lang-btn ${l.code===currentLang?'active':''}" onclick="changeLang('${l.code}')">
      <span>${l.flag}</span><span>${l.name}</span>
    </button>`).join('');
}

function renderHeader() {
  const subtitles = {
    es:'MENÚ', en:'MENU', de:'SPEISEKARTE', ja:'メニュー',
    fr:'CARTE', it:'MENU', nl:'KAART', ru:'МЕНЮ'
  };
  document.getElementById('subtitle').textContent = subtitles[currentLang] || 'MENÚ';
}

function renderTabs() {
  const menu = getMenu(currentLang);
  document.getElementById('tab-bar').innerHTML = menu.map((cat,idx) => `
    <button class="tab-btn ${idx===currentTab?'active':''}" onclick="changeTab(${idx})" style="${ICON_COLORS[idx]}">
      ${cat.icon} ${cat.title}
    </button>`).join('');
}

function itemHTML(it, price) {
  const p = it.price || price || '';
  return `
    <div class="menu-item">
      <div class="menu-item-top">
        <span class="menu-item-name">${it.name}</span>
        <span class="menu-item-price">${p}</span>
      </div>
      ${it.desc ? `<span class="menu-item-desc">${it.desc}</span>` : ''}
      ${it.options ? `<span class="menu-item-options">● ${it.options}</span>` : ''}
    </div>`;
}

function renderCard() {
  const menu = getMenu(currentLang);
  const cat  = menu[currentTab];
  const card = document.getElementById('card-inner');

  let priceHTML = (cat.globalPrice && !cat.subcategories && !cat.accordion)
    ? `<span class="card-price-global">${cat.globalPrice}</span>` : '';

  let bodyHTML = '';

  // ACORDEÓN (Cocina y Obrador)
  if (cat.accordion) {
    bodyHTML = `<div class="accordion">`;
    cat.sections.forEach((sec, si) => {
      const openClass = si === 0 ? 'open' : '';
      bodyHTML += `
        <div class="accordion-section">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <span class="accordion-title">${sec.title}</span>
            <span class="accordion-arrow ${openClass}">${ICONS.chevron}</span>
          </div>
          <div class="accordion-body ${openClass}">
            <div class="items-grid">
              ${sec.items.map(it => itemHTML(it)).join('')}
            </div>
          </div>
        </div>`;
    });
    bodyHTML += `</div>`;

    // Agregados
    if (cat.agregados) {
      bodyHTML += `
        <div class="agregados-box">
          <div class="agregados-title">+ Agregados</div>
          <div class="agregados-list">
            ${cat.agregados.map(a => `
              <div class="agregado-chip">${a.name}<span>${a.price}</span></div>`).join('')}
          </div>
        </div>`;
    }

  // SUBCATEGORÍAS (Tés)
  } else if (cat.subcategories) {
    bodyHTML = `<div class="sub-grid">${cat.subcategories.map(sub => `
      <div class="subcat">
        <div class="subcat-header">
          <div class="subcat-dot ${sub.dot}"></div>
          <div>
            <div class="subcat-name">${sub.name}</div>
            <div class="subcat-tag">${sub.tag}</div>
          </div>
        </div>
        <div class="subcat-profile">${sub.profile}</div>
        <ul>${sub.items.map(it => `
          <li>
            <div class="subcat-li-top">
              <span class="subcat-li-name">${it.name}</span>
              <span class="subcat-li-price">${cat.globalPrice}</span>
            </div>
            ${it.desc ? `<span class="subcat-li-desc">${it.desc}</span>` : ''}
          </li>`).join('')}
        </ul>
      </div>`).join('')}
    </div>`;

  // ITEMS SIMPLES CON PRECIO GLOBAL
  } else if (cat.simpleItems) {
    bodyHTML = `<div class="items-grid">
      ${cat.simpleItems.map(it => itemHTML(it, cat.globalPrice)).join('')}
    </div>`;

  // ITEMS CON PRECIO PROPIO
  } else {
    bodyHTML = `<div class="items-grid">
      ${cat.items.map(it => itemHTML(it)).join('')}
    </div>`;
  }

  const noteHTML = cat.notes
    ? `<div class="card-note">${ICONS.info}<p>${cat.notes}</p></div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title" style="${ICON_COLORS[currentTab]}">${cat.icon} ${cat.title}</div>
      ${priceHTML}
    </div>
    ${bodyHTML}
    ${noteHTML}`;
}

function renderFooter() {
  document.getElementById('footer-text').textContent =
    `© ${new Date().getFullYear()} Escaramuza Coffee Bar · Precios con IVA incluido.`;
}

function render() {
  renderLangBar();
  renderHeader();
  renderTabs();
  renderCard();
  renderFooter();
}

function changeLang(code) { currentLang = code; currentTab = 0; render(); }
function changeTab(idx)   { currentTab = idx; renderTabs(); renderCard(); }

function toggleAccordion(header) {
  const arrow = header.querySelector('.accordion-arrow');
  const body  = header.nextElementSibling;
  arrow.classList.toggle('open');
  body.classList.toggle('open');
}

render();
</script>
</body>
