  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f9f6f1;
      color: #2c1a0e;
      min-height: 100vh;
    }

    #lang-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e8e0d5;
    }
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      background: #f5f0ea;
      color: #5a3e28;
      transition: all 0.2s;
    }
    .lang-btn:hover { background: #e8dfd3; }
    .lang-btn.active { background: #2c1a0e; color: #fff; }

    header {
      text-align: center;
      padding: 40px 20px 28px;
    }
    header img {
      max-width: 320px;
      width: 80%;
      margin: 0 auto 16px;
      display: block;
    }
    .header-line {
      width: 48px; height: 2px;
      background: #c8a97e;
      margin: 12px auto;
    }
    header p {
      font-size: 0.78rem;
      letter-spacing: 4px;
      color: #9a7d5e;
      font-style: italic;
    }

    #tab-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 0 16px 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1.5px solid #ddd3c7;
      background: #fff;
      color: #7a6050;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      font-family: Georgia, serif;
    }
    .tab-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .tab-btn:hover { background: #f5ede3; }
    .tab-btn.active {
      background: #2c1a0e; color: #fff;
      border-color: #2c1a0e;
      box-shadow: 0 4px 14px rgba(44,26,14,0.18);
    }

    #menu-card {
      max-width: 900px;
      margin: 0 auto 48px;
      padding: 0 16px;
    }
    .card-inner {
      background: #fff;
      border-radius: 32px;
      border: 1px solid #ece5db;
      box-shadow: 0 8px 40px rgba(44,26,14,0.07);
      padding: clamp(24px, 6vw, 56px);
      min-height: 480px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f3ede5;
      padding-bottom: 24px;
      margin-bottom: 32px;
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 300;
      color: #2c1a0e;
    }
    .card-title svg { width: 24px; height: 24px; flex-shrink: 0; }
    .card-price-global {
      font-size: 1.5rem;
      color: #ccc0b0;
      font-style: italic;
      font-weight: 300;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px 56px;
      align-items: start;
    }
    .menu-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f5f0ea;
    }
    
    /* Destacado especial para la Milanesa */
    .menu-item.highlighted-item {
      background: #fffcf8;
      border: 1.5px solid #c8a97e;
      border-radius: 12px;
      padding: 16px;
      margin: -8px;
      box-shadow: 0 4px 12px rgba(200, 169, 126, 0.15);
    }
    /* Clase para doble ancho y centrado */
    .menu-item.full-width {
      grid-column: 1 / -1;
      text-align: center;
      align-items: center;
    }
    .menu-item.full-width .menu-item-top {
      justify-content: center;
      width: 100%;
    }

    .menu-item-note {
      font-size: 0.8rem;
      color: #c8293a;
      font-weight: bold;
      margin-top: 6px;
      background: #fdf2f2;
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
      width: fit-content;
    }

    .menu-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .menu-item-name {
      font-size: 1rem;
      font-weight: 600;
      color: #2c1a0e;
      line-height: 1.4;
    }
    .menu-item-price {
      color: #b0a090;
      font-style: italic;
      font-size: 0.9rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .menu-item-desc {
      font-size: 0.8rem;
      color: #9a8070;
      line-height: 1.5;
      font-style: italic;
    }
    .menu-item-options {
      font-size: 0.78rem;
      color: #c8a97e;
      font-weight: 600;
      margin-top: 2px;
    }

    .section-block { margin-bottom: 36px; }
    .section-block-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: #c8a97e; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid #f0e8dc;
    }

    .cocktail-section { margin-bottom: 36px; }
    .cocktail-section-header {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid #f0e8dc;
    }
    .cocktail-section-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: #c8293a;
    }
    .cocktail-section-subtitle { font-size: 0.75rem; font-style: italic; color: #c8a97e; }

    .sub-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 32px;
    }
    .subcat { display: flex; flex-direction: column; gap: 12px; }
    .subcat-header { display: flex; align-items: center; gap: 12px; }
    .subcat-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
    .dot-black { background: #3f3f46; }
    .dot-green { background: #10b981; }
    .dot-gold  { background: #fbbf24; }
    .dot-amber { background: #ea580c; }
    .subcat-name { font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #2c1a0e; }
    .subcat-tag { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #9a8070; }
    .subcat-profile {
      font-size: 0.82rem; color: #7a6a58; font-style: italic; line-height: 1.5;
      background: #f9f5f0; border-left: 3px solid #ddd3c7; padding: 10px 14px; border-radius: 0 8px 8px 0;
    }
    .subcat ul { list-style: none; display: flex; flex-direction: column; gap: 14px; padding-top: 4px; }
    .subcat li { display: flex; flex-direction: column; gap: 3px; }
    .subcat-li-top { display: flex; justify-content: space-between; align-items: baseline; }
    .subcat-li-name { font-size: 0.95rem; font-weight: 600; color: #2c1a0e; }
    .subcat-li-price { font-size: 0.85rem; color: #c0b0a0; font-style: italic; }
    .subcat-li-desc { font-size: 0.78rem; color: #9a8070; font-style: italic; line-height: 1.4; }

    .agregados-box {
      margin-top: 24px; padding: 16px 20px; background: #f9f5f0;
      border: 1px solid #ece5db; border-radius: 16px;
    }
    .agregados-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #9a8070; margin-bottom: 10px; }
    .agregados-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .agregado-chip { background: #fff; border: 1px solid #ddd3c7; border-radius: 999px; padding: 5px 12px; font-size: 0.78rem; color: #5a3e28; }
    .agregado-chip span { color: #c8a97e; font-weight: 700; margin-left: 4px; }

    .card-note {
      margin-top: 32px; padding: 16px 20px; background: #f9f5f0;
      border: 1px solid #ece5db; border-radius: 20px; display: flex;

    .card-note svg { width: 18px; height: 18px; color: #b0a090; flex-shrink: 0; }

    footer { text-align: center; padding: 20px; font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase; color: #c0b0a0; }

    @media (max-width: 520px) {
      .items-grid { grid-template-columns: 1fr; }
      .sub-grid   { grid-template-columns: 1fr; }
    }
  </style>
</head>

let currentLang = 'es';
let currentTab  = 0;

function renderLangBar() {
  const codes = Object.keys(menuData);
  document.getElementById('lang-bar').innerHTML = codes.map(code => `
    <button class="lang-btn ${code === currentLang ? 'active' : ''}" onclick="changeLang('${code}')">
      <span>${menuData[code].flag}</span><span>${menuData[code].name}</span>
    </button>`).join('');
}

function renderHeader() {
  document.getElementById('subtitle').textContent = menuData[currentLang].subtitle;
}

function renderTabs() {
  const t = menuData[currentLang];
  document.getElementById('tab-bar').innerHTML = t.tabs.map((tabName, idx) => `
    <button class="tab-btn ${idx === currentTab ? 'active' : ''}" onclick="changeTab(${idx})" style="${ICON_COLORS[idx]}">
      ${TAB_ICONS[idx]} ${tabName}
    </button>`).join('');
}

function itemHTML(it, globalPrice) {
  const price = it.price || globalPrice || '';
  const extraClass = (it.highlight ? ' highlighted-item' : '') + (it.fullWidth ? ' full-width' : '');
  return `
    <div class="menu-item${extraClass}">
      <div class="menu-item-top">
        <span class="menu-item-name">${it.name}</span>
        <span class="menu-item-price">${price}</span>
      </div>
      ${it.desc ? `<span class="menu-item-desc">${it.desc}</span>` : ''}
      ${it.options ? `<span class="menu-item-options">● ${it.options}</span>` : ''}
      ${it.note ? `<span class="menu-item-note">${it.note}</span>` : ''}
    </div>`;
}

function renderCard() {
  const t = menuData[currentLang];
  const catData = t.menu[currentTab];
  let bodyHTML = '';

  if (catData.cocktailSections) {
    bodyHTML = catData.cocktailSections.map(sec => {
      const info = t.cocktailSections[sec.key];
      return `
        <div class="cocktail-section">
          <div class="cocktail-section-header">
            <span class="cocktail-section-title">${info.title}</span>
            ${info.sub ? `<span class="cocktail-section-subtitle">— ${info.sub} — ${sec.price}</span>` : ''}
          </div>
          <div class="items-grid">
            ${sec.items.map(it => itemHTML(it)).join('')}
          </div>
        </div>`;
    }).join('');

  } else if (catData.subcategories) {
    bodyHTML = `<div class="sub-grid">${catData.subcategories.map(sub => `
      <div class="subcat">
        <div class="subcat-header">
          <div class="subcat-dot ${sub.dot}"></div>
          <div>
            <div class="subcat-name">${sub.name}</div>
            <div class="subcat-tag">${sub.tag}</div>
          </div>
        </div>
        <div class="subcat-profile">${sub.profile}</div>
        <ul>${sub.items.map(it => `
          <li>
            <div class="subcat-li-top">
              <span class="subcat-li-name">${it.name}</span>
              <span class="subcat-li-price">${catData.globalPrice}</span>
            </div>
            ${it.desc ? `<span class="subcat-li-desc">${it.desc}</span>` : ''}
          </li>`).join('')}
        </ul>
      </div>`).join('')}
    </div>`;

  } else if (catData.flatSections) {
    bodyHTML = catData.flatSections.map(sec => `
      <div class="section-block">
        <div class="items-grid">
          ${sec.items.map(it => itemHTML(it)).join('')}
        </div>
      </div>`).join('');

    if (catData.agregados) {
      bodyHTML += `
        <div class="agregados-box">
          <div class="agregados-title">${t.agregadosTitle}</div>
          <div class="agregados-list">
            ${catData.agregados.map(a => `
              <div class="agregado-chip">${a.name}<span>${a.price}</span></div>`).join('')}
          </div>
        </div>`;
    }

  } else {
    bodyHTML = `<div class="items-grid">
      ${catData.items.map(it => itemHTML(it, catData.globalPrice)).join('')}
    </div>`;
  }

  const priceHTML = (catData.globalPrice && !catData.subcategories) ? `<span class="card-price-global">${catData.globalPrice}</span>` : '';
  
  // Mostrar la nota del suplemento solo en Cafetería y Matcha Bar (índices 2 y 3)
  const noteHTML = ((currentTab === 2 || currentTab === 3) && t.supplement) ? `<div class="card-note">${ICONS.info}<p>${t.supplement}</p></div>` : '';

  document.getElementById('card-inner').innerHTML = `
    <div class="card-header">
      <div class="card-title" style="${ICON_COLORS[currentTab]}">${TAB_ICONS[currentTab]} ${t.tabs[currentTab]}</div>
      ${priceHTML}
    </div>
    ${bodyHTML}
    ${noteHTML}`;
}

function renderFooter() {
  document.getElementById('footer-text').textContent = `© ${new Date().getFullYear()} Escaramuza Coffee Bar · ${menuData[currentLang].footer}`;
}

function render() {
  renderLangBar();
  renderHeader();
  renderTabs();
  renderCard();
  renderFooter();
}

function changeLang(code) { currentLang = code; currentTab = 0; render(); }
function changeTab(idx)   { currentTab = idx; renderTabs(); renderCard(); }

render();
</script>
</body>
</html>
